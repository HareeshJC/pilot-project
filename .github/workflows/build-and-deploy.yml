name: Build, Test & Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/build-and-deploy.yml'
      - '.dockerignore'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  COMPONENT_INSTANCE: ${{ vars.COMPONENT_INSTANCE || 'dv01' }}
  LOCATION_ABBREVIATION: ${{ vars.LOCATION_ABBREVIATION || 'si' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-container-apps' }}

jobs:
  build-and-test:
    name: Build & Test Applications
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies (API)
        run: dotnet restore src/api/api.csproj
      
      - name: Build API
        run: |
          dotnet build src/api/api.csproj \
            --configuration Release \
            --no-restore \
            --verbosity normal
      
      - name: Run API Tests
        run: dotnet test src/api/api.csproj --configuration Release --no-build || true
      
      - name: Restore dependencies (Worker)
        run: dotnet restore src/worker/worker.csproj
      
      - name: Build Worker
        run: |
          dotnet build src/worker/worker.csproj \
            --configuration Release \
            --no-restore \
            --verbosity normal
      
      - name: Run Worker Tests
        run: dotnet test src/worker/worker.csproj --configuration Release --no-build || true
      
      - name: Generate build metadata
        id: meta
        run: |
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "commit_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
    
    outputs:
      build_number: ${{ steps.meta.outputs.build_number }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      commit_short: ${{ steps.meta.outputs.commit_short }}
      build_date: ${{ steps.meta.outputs.build_date }}

  build-api-image:
    name: Build API Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    environment:
      name: "SUB-DV-IPAAS-SI-01"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Generate image tags
        id: tags
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "api_tag_latest=${{ env.REGISTRY }}/api:latest" >> $GITHUB_OUTPUT
          echo "api_tag_sha=${{ env.REGISTRY }}/api:${{ needs.build-and-test.outputs.commit_short }}" >> $GITHUB_OUTPUT
          echo "api_tag_timestamp=${{ env.REGISTRY }}/api:${{ needs.build-and-test.outputs.commit_short }}-${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.api_tag_latest }}
            ${{ steps.tags.outputs.api_tag_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.build-and-test.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Upload image metadata
        run: |
          echo "API Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.tags.outputs.api_tag_latest }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ steps.tags.outputs.api_tag_sha }}" >> $GITHUB_STEP_SUMMARY

  build-worker-image:
    name: Build Worker Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    environment:
      name: "SUB-DV-IPAAS-SI-01"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Generate image tags
        id: tags
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "worker_tag_latest=${{ env.REGISTRY }}/worker:latest" >> $GITHUB_OUTPUT
          echo "worker_tag_sha=${{ env.REGISTRY }}/worker:${{ needs.build-and-test.outputs.commit_short }}" >> $GITHUB_OUTPUT
          echo "worker_tag_timestamp=${{ env.REGISTRY }}/worker:${{ needs.build-and-test.outputs.commit_short }}-${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: src
          file: ./src/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.tags.outputs.worker_tag_latest }}
            ${{ steps.tags.outputs.worker_tag_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.build-and-test.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Upload image metadata
        run: |
          echo "Worker Image Tags:" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.tags.outputs.worker_tag_latest }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ steps.tags.outputs.worker_tag_sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-api:
    name: Deploy API to Container Apps
    needs: [build-and-test, build-api-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    environment:
      name: "SUB-DV-IPAAS-SI-01"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get image details
        id: image
        run: |
          echo "api_image=${{ env.REGISTRY }}/api:${{ needs.build-and-test.outputs.commit_short }}" >> $GITHUB_OUTPUT
      
      - name: Deploy API Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az containerapp update \
              --name "ca-api-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ steps.image.outputs.api_image }}" \
              --query 'properties.provisioningState' || true
      
      - name: Verify API deployment
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "Waiting for API deployment to be ready..." 
            sleep 30
            
            # Get the latest revision
            LATEST_REV=$(az containerapp revision list \
              --name "ca-api-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query '[0].name' -o tsv)
            
            echo "Latest API Revision: $LATEST_REV"
            
            # Check revision status
            az containerapp revision show \
              --name "ca-api-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --revision $LATEST_REV || true
      
      - name: API deployment summary
        run: |
          echo "### ✅ API Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.image.outputs.api_image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ needs.build-and-test.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-worker:
    name: Deploy Worker to Container Apps
    needs: [build-and-test, build-worker-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    environment:
      name: "SUB-DV-IPAAS-SI-01"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get image details
        id: image
        run: |
          echo "worker_image=${{ env.REGISTRY }}/worker:${{ needs.build-and-test.outputs.commit_short }}" >> $GITHUB_OUTPUT
      
      - name: Deploy Worker Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az containerapp update \
              --name "ca-worker-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ steps.image.outputs.worker_image }}" \
              --query 'properties.provisioningState' || true
      
      - name: Verify Worker deployment
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "Waiting for Worker deployment to be ready..."
            sleep 30
            
            # Get the latest revision
            LATEST_REV=$(az containerapp revision list \
              --name "ca-worker-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query '[0].name' -o tsv)
            
            echo "Latest Worker Revision: $LATEST_REV"
            
            # Check revision status
            az containerapp revision show \
              --name "ca-worker-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --revision $LATEST_REV || true
      
      - name: Worker deployment summary
        run: |
          echo "### ✅ Worker Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.image.outputs.worker_image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ needs.build-and-test.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY

  post-deployment:
    name: Post-Deployment Verification
    needs: [deploy-api, deploy-worker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
    
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Verify Container Apps Status
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "=== API Container App Status ==="
            az containerapp show \
              --name "ca-api-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query 'properties.{provisioningState:provisioningState, runningStatus:properties.runningStatus}' || true
            
            echo ""
            echo "=== Worker Container App Status ==="
            az containerapp show \
              --name "ca-worker-${{ env.LOCATION_ABBREVIATION }}${{ env.COMPONENT_INSTANCE }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query 'properties.{provisioningState:provisioningState, runningStatus:properties.runningStatus}' || true
      
      - name: Generate deployment report
        run: |
          echo "## 📋 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Metadata" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ secrets.ENVIRONMENT || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ secrets.REGISTRY_LOGIN_SERVER }}" >> $GITHUB_STEP_SUMMARY
