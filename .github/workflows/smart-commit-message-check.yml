name: 'Smart Commit Message Check'
on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  push:
    branches:
      - 'releases/*'
      - 'feature/*'
      - 'user/*'
      

jobs:
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Check Commit Type
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '(IPT-[\d]|IP-[\d]|AZF-[\d]|DP-[\d]|CPDO-[\d])'
          flags: 'gm'
          error: 'Your commit message has to contain the JIRA WORK ITEM ID i.e. "IPT-584 or IP-584 or DP-123 or CPDO-123 Fixing Production Bug".'